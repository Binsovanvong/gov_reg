name: gov_reg
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.1+6

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  http_parser: 4.1.2
  file_picker: ^8.0.0
  google_fonts: ^6.3.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.6
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  gal: ^2.3.0
  image_picker: ^1.0.7
  share_plus: ^10.0.2
  photo_manager: ^3.0.0
  image: ^4.7.2
  auto_size_text: ^3.0.0
  connectivity_plus: ^6.0.5
  screenshot: ^3.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_app.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#3C76D2"
  adaptive_icon_foreground: "assets/icon/icon_app.png"
flutter:
  uses-material-design: true
  assets:
    - assets/img/
    - assets/icon/
